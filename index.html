function vpSize(){ var vv=window.visualViewport;
  return vv ? {w:vv.width, h:vv.height} : {w:window.innerWidth, h:window.innerHeight}; }
function resize(){ var s=vpSize(), k=Math.max(0.5, Math.min(s.w/W, s.h/H));
  stage.style.transform="scale("+k+")"; }
window.addEventListener("resize", resize);

/* ===== Sound (WebAudio beeps) ===== */
var AC=null, soundOn=true;
function initAudio(){ if(AC) return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
function beep(freq, dur, type, vol){
  if(!AC||!soundOn) return;
  try{ var o=AC.createOscillator(), g=AC.createGain();
    o.type=type||"square"; o.frequency.value=freq;
    g.gain.value=vol||0.06; o.connect(g); g.connect(AC.destination);
    var t=AC.currentTime; o.start(t); g.gain.setValueAtTime(g.gain.value,t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur); o.stop(t+dur);
  }catch(e){}
}
function sfx(kind){
  if(kind==="select") beep(660,0.06,"square",0.05);
  else if(kind==="hit") beep(180,0.12,"sawtooth",0.07);
  else if(kind==="super"){ beep(320,0.09,"square",0.07); setTimeout(function(){beep(480,0.12,"square",0.07);},70); }
  else if(kind==="faint") beep(140,0.35,"triangle",0.07);
  else if(kind==="catch"){ beep(520,0.08); setTimeout(function(){beep(700,0.12);},110); }
  else if(kind==="win"){ beep(523,0.1); setTimeout(function(){beep(659,0.1);},100); setTimeout(function(){beep(784,0.18);},200); }
  else if(kind==="level"){ beep(700,0.08); setTimeout(function(){beep(900,0.12);},80); }
  else if(kind==="evolve"){ beep(400,0.1); setTimeout(function(){beep(600,0.1);},120); setTimeout(function(){beep(900,0.2);},260); }
  else if(kind==="warp") beep(300,0.14,"sine",0.06);
  else if(kind==="step") beep(160,0.025,"sine",0.015);
}

  else { p.prog+=p.speed; if(p.prog>=1){ p.prog=0; p.moving=false; onStep(); } }
}

/* ===== Buddies, leveling, evolution ===== */
function makeMon(id,level){ var sp=SPECIES[id], b=sp.base, maxhp=b.hp+level*3+6;
  return { id:id, sp:sp, name:sp.name, nick:null, level:level, maxhp:maxhp, hp:maxhp, atk:b.atk+level, def:b.def+level, spd:b.spd+level, xp:0, moves:sp.moves.slice(), status:null, slpT:0 }; }
function dname(m){ return m.nick||m.name; }
function xpToNext(l){ return 14+l*10; }
function learnMove(mon, key, msgs){ if(!MOVES[key]||mon.moves.indexOf(key)>=0) return;
  var nm=MOVES[key].name;
  if(mon.moves.length<4){ mon.moves.push(key); msgs.push(dname(mon)+" learned "+nm+"!"); }
  else { var forgot=MOVES[mon.moves[0]].name; mon.moves.shift(); mon.moves.push(key); msgs.push(dname(mon)+" forgot "+forgot+" and learned "+nm+"!"); } }
function gainXp(mon, amt, msgs){ mon.xp+=amt; msgs.push(dname(mon)+" gained "+amt+" XP.");
  while(mon.xp>=xpToNext(mon.level)){ mon.xp-=xpToNext(mon.level); mon.level++; mon.maxhp+=3; mon.hp+=3; mon.atk++; mon.def++; mon.spd++; msgs.push(dname(mon)+" grew to level "+mon.level+"!");
    var ls=mon.sp.learn; if(ls&&ls[mon.level]) learnMove(mon, ls[mon.level], msgs); } }
function evolveCheck(mon, msgs){ var e=mon.sp.evo; if(!e||mon.level<e.lvl) return false;
  var ratio=mon.hp/mon.maxhp, ns=SPECIES[e.to], b=ns.base, oldName=dname(mon);
  mon.id=e.to; mon.sp=ns; if(!mon.nick) mon.name=ns.name; mon.maxhp=b.hp+mon.level*3+6; mon.hp=Math.max(1,Math.round(mon.maxhp*ratio));
  mon.atk=b.atk+mon.level; mon.def=b.def+mon.level; mon.spd=b.spd+mon.level; mon.moves=ns.moves.slice();
  G.seen[e.to]=true; G.caught[e.to]=true; msgs.push(oldName+" is evolving..."); msgs.push(oldName+" evolved into "+ns.name+"!"); return true; }
function addBuddy(m){ if(G.party.length<6){ G.party.push(m); return "team"; } G.box.push(m); return "box"; }
function firstAble(){ for(var i=0;i<G.party.length;i++) if(G.party[i].hp>0) return i; return -1; }

/* ===== Battle engine ===== */
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function eMoveOf(m){ return MOVES[m.moves[Math.floor(Math.random()*m.moves.length)]]; }
function hit(a,d,mv){ var mult=typeMult(mv.type,d.sp.type), stab=(mv.type===a.sp.type)?1.5:1;
  var dmg=Math.floor((a.atk*mv.power/(d.def+18))*mult*stab*(0.85+Math.random()*0.15))+1;
  if(a.status==="brn") dmg=Math.max(1,Math.floor(dmg*0.5));
  if(G.weather==="rain"){ if(mv.type==="Water") dmg=Math.floor(dmg*1.5); else if(mv.type==="Fire") dmg=Math.max(1,Math.floor(dmg*0.7)); }
  else if(G.weather==="sun"){ if(mv.type==="Fire") dmg=Math.floor(dmg*1.5); else if(mv.type==="Water") dmg=Math.max(1,Math.floor(dmg*0.7)); else if(mv.type==="Grass") dmg=Math.floor(dmg*1.25); }
  d.hp=Math.max(0,d.hp-dmg); return {dmg:dmg,mult:mult}; }
function espd(m){ return m.status==="par"?m.spd*0.5:m.spd; }
function applyStatus(mon,st,msgs,label){
  if(mon.status) return;
  mon.status=st;
  if(st==="slp"){ mon.slpT=1+Math.floor(Math.random()*3); msgs.push(label+" fell asleep!"); }
  else if(st==="par") msgs.push(label+" is paralyzed!");
  else if(st==="brn") msgs.push(label+" was burned!");
}
function preAct(atk,label,msgs){
  if(atk.status==="slp"){ if(atk.slpT>0){ atk.slpT--; msgs.push(label+" is fast asleep..."); return false; }
    atk.status=null; msgs.push(label+" woke up!"); }
  if(atk.status==="par" && Math.random()<0.25){ msgs.push(label+" is paralyzed! It cannot move!"); return false; }
  return true;
}
function actMove(atk,def,mv,label,defLabel,msgs){
  if(!preAct(atk,label,msgs)) return;
  if(mv.power===0 && mv.eff){
    msgs.push(label+" used "+mv.name+"!");
    if(def.status){ msgs.push("But it failed!"); return; }
    if(Math.random()>(mv.acc||1)){ msgs.push("But it missed!"); return; }
    applyStatus(def,mv.eff,msgs,defLabel); return;
  }
  msgs.push(label+" used "+mv.name+"!");
  var r=hit(atk,def,mv); addEff(msgs,r);
  if(mv.burn && def.hp>0 && !def.status && Math.random()<mv.burn) applyStatus(def,"brn",msgs,defLabel);
  if(def.hp<=0){ msgs.push(defLabel+" fainted!"); def.status=null; def.slpT=0; }
}
function endStatus(mon,label,msgs){
  if(mon.hp<=0) return;
  if(mon.status==="brn"){
    var d=Math.max(1,Math.floor(mon.maxhp/8));
    mon.hp=Math.max(0,mon.hp-d);
    msgs.push(label+" is hurt by its burn!");
    if(mon.hp<=0){ msgs.push(label+" fainted!"); mon.status=null; }
  }
}
function addEff(msgs,r){ if(r.mult>1) msgs.push("It is super effective!"); else if(r.mult>0&&r.mult<1) msgs.push("It is not very effective..."); else if(r.mult===0) msgs.push("It had no effect..."); }
function queueMsgs(arr,after){ var B=G.battle; B.msgs=arr; B.mi=0; B._shownMi=-1; B.phase="msg"; B.after=after; }
function startBattle(wild,isWild){ var idx=firstAble(); if(idx<0) return;
  G.battle={ wild:wild,isWild:isWild,trainer:null,me:idx,phase:"msg",sel:0,forced:false,msgs:[],mi:0,after:null,anim:null,_shownMi:-1 }; G.mode="battle";
  var intro=["A wild "+wild.name+" (L"+wild.level+") appeared!"]; if(G.weather==="rain") intro.unshift("Rain is pouring down!"); else if(G.weather==="sun") intro.unshift("The sunlight is harsh!");
  queueMsgs(intro, function(){ G.battle.phase="menu"; G.battle.sel=0; }); }

  var bonus=lvlBonus||0;
  var team=npc.team.map(function(t){ return makeMon(t[0],t[1]+bonus); });
  G.battle={ trainer:npc,isWild:false,enemyTeam:team,enemyIdx:0,wild:team[0],me:idx,phase:"msg",sel:0,forced:false,msgs:[],mi:0,after:null,anim:null,_shownMi:-1 }; G.mode="battle";

function faintSeq(){ var B=G.battle, alive=firstAble();

function resolveTurn(pMove){ var B=G.battle, me=G.party[B.me], wild=B.wild, eMove=eMoveOf(wild), msgs=[];

    else if(order[i]==="e"&&wild.hp>0&&me.hp>0) actMove(wild,me,eMove,eLabel,pLabel,msgs);

function doSwitch(i,vol){ var B=G.battle; B.me=i; B.forced=false; var msgs=[dname(G.party[i])+", go!"];

function enemyMove(msgs){ var B=G.battle; if(B.wild.hp>0){ var e=eMoveOf(B.wild), me=G.party[B.me]; actMove(B.wild,me,e,(B.trainer?"":"Wild ")+B.wild.name,dname(me),msgs); } }
function useBattleItem(k){ var B=G.battle;

  var pct=Math.max(0,mon._dhp/mon.maxhp), col=pct>0.5?"#4caf50":pct>0.25?"#ffb300":"#e53935"; ctx.fillStyle=col; rr(x+8,y+24,136*pct,8);
  btxt(Math.max(0,Math.round(mon._dhp))+"/"+mon.maxhp, x+8,y+38,"#cfe0ff",10);
  if(showXp){ var xr=Math.max(0,Math.min(1,mon.xp/xpToNext(mon.level))); ctx.fillStyle="#1b2540"; rr(x+8,y+44,136,4); ctx.fillStyle="#4fc3f7"; rr(x+8,y+44,136*xr,4); } }
function classify(msg){ if(msg.indexOf("super effective")>=0) return "super"; if(msg.indexOf("evolved into")>=0) return "evolve"; if(msg.indexOf("evolving")>=0) return "evolveStart";
  if(msg.indexOf("grew to level")>=0) return "level"; if(msg.indexOf("threw a Buddy Orb")>=0) return "throw"; if(msg.indexOf("Gotcha")>=0) return "caught"; if(msg.indexOf("broke free")>=0) return "broke";
  if(msg.indexOf(" used ")>=0){ return msg.indexOf("Wild ")===0||(G.battle.trainer&&msg.indexOf(dname(G.party[G.battle.me]))!==0)?"eatk":"patk"; }
  if(msg.indexOf("fainted")>=0){ return (msg.indexOf("Wild ")===0||(G.battle.trainer&&msg.indexOf(dname(G.party[G.battle.me]))!==0))?"efaint":"pfaint"; } return "none"; }
function sfxFor(k){ if(k==="patk"||k==="eatk") sfx("hit"); else if(k==="super") sfx("super"); else if(k==="efaint"||k==="pfaint") sfx("faint"); else if(k==="level") sfx("level"); else if(k==="evolve") sfx("evolve"); else if(k==="caught") sfx("catch"); }
function sparkles(cx,cy,t){ for(var i=0;i<7;i++){ var a=i*0.9+t*0.15, rad=20+((t*2+i*9)%40); var x=cx+Math.cos(a)*rad, y=cy+Math.sin(a)*rad*0.7; ctx.fillStyle="#ffe066"; ctx.save(); ctx.translate(x,y); ctx.rotate(a); rr(-2,-2,4,4); ctx.restore(); } }
function drawOrb(x,y,rot){ ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.fillStyle="#e53935"; ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill(); ctx.fillStyle="#f5f5f5"; ctx.beginPath(); ctx.arc(0,3,8,0,Math.PI); ctx.fill(); ctx.fillStyle="#222"; rr(-8,-1,16,2); ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(0,0,3,0,7); ctx.fill(); ctx.fillStyle="#bbb"; ctx.beginPath(); ctx.arc(0,0,1.4,0,7); ctx.fill(); ctx.restore(); }
function spawnRustle(wx,wy){ for(var i=0;i<5;i++) PARTS.push({x:wx,y:wy,vx:(Math.random()-0.5)*1.6,vy:-Math.random()*1.6-0.5,life:14+Math.random()*8,c:i%2?"#dff5b0":"#a8d878"}); }
function updateParts(){ for(var i=PARTS.length-1;i>=0;i--){ var p=PARTS[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--; if(p.life<=0) PARTS.splice(i,1); } }
function spawnDust(wx,wy){ for(var i=0;i<3;i++) PARTS.push({x:wx,y:wy,vx:(Math.random()-0.5)*1.2,vy:-Math.random()*0.8,life:10+Math.random()*6,c:"#cdb089"}); }
function drawCloud(cx,cy,r){ ctx.fillStyle="rgba(255,255,255,.85)"; ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.62,0,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx+r*0.8,cy+3,r*0.7,r*0.5,0,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx-r*0.8,cy+4,r*0.6,r*0.45,0,0,7); ctx.fill(); }
function saveSummary(){ try{ var d=JSON.parse(localStorage.getItem(SAVE_KEY)); if(!d) return null; var team=(d.party||[]).length; var b=d.badges?Object.keys(d.badges).filter(function(k){ return d.badges[k]; }).length:0; var nm=(d.player&&d.player.name)?d.player.name:"JJ"; return nm+"  -  "+team+" Buddies  -  "+b+" badge"+(b===1?"":"s"); }catch(e){ return null; } }
function renderTitle(){ var g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#7fc4ff"); g.addColorStop(0.6,"#bfe6ff"); g.addColorStop(1,"#d9f0d0"); ctx.fillStyle=g; rr(0,0,W,H);
  ctx.fillStyle="rgba(255,241,180,.85)"; ctx.beginPath(); ctx.arc(W-64,58,32,0,7); ctx.fill();
  for(var c=0;c<4;c++){ var cx=((TICK*0.3+c*150)%(W+140))-70, cy=38+(c*29)%74; drawCloud(cx,cy,17+c*3); }
  ctx.fillStyle="#5aa84b"; rr(0,H*0.72,W,H*0.28); ctx.fillStyle="#4c9a3f"; for(var x=0;x<W;x+=14){ var hh=6+((x*7)%5); rr(x,H*0.72-hh,3,hh); }
  var trio=["sprucub","emberkit","dribblet"]; for(var i=0;i<3;i++){ var sp=SPECIES[trio[i]], bx=W*0.27+i*W*0.23, by=H*0.82+Math.sin(TICK*0.06+i*1.5)*6; drawCreature(bx,by,46,sp,i%2===0); }
  for(var s=0;s<7;s++){ var a=TICK*0.02+s*0.9, sx2=W*0.5+Math.cos(a)*150, sy2=H*0.38+Math.sin(a*1.3)*66; ctx.fillStyle="rgba(255,255,255,"+(0.35+0.35*Math.sin(TICK*0.1+s))+")"; rr(sx2,sy2,2,2); }
  var ss=saveSummary(); if(ss){ ctx.font="12px Trebuchet MS"; ctx.textAlign="center"; ctx.textBaseline="middle"; var w2=ctx.measureText("Continue: "+ss).width+20; ctx.fillStyle="rgba(16,18,40,.55)"; rr(W/2-w2/2,H-27,w2,19); ctx.fillStyle="#dfffe0"; ctx.fillText("Continue: "+ss,W/2,H-17); ctx.textAlign="left"; } }
function renderBattle(){ var B=G.battle; if(!B){ renderWorld(); return; } var me=G.party[B.me], wild=B.wild; ctx.save(); var _sk=FX.shake>0?(Math.random()-0.5)*FX.shake:0; ctx.translate(_sk,_sk*0.6);
  var g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#8fd0ff"); g.addColorStop(1,"#cfeeff"); ctx.fillStyle=g; rr(0,0,W,H);
  ctx.fillStyle="#a6e07a"; rr(0,H*0.58,W,H*0.42);
  ctx.fillStyle="rgba(0,0,0,.10)"; ctx.beginPath(); ctx.ellipse(W*0.72,H*0.40,70,18,0,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(W*0.26,H*0.66,82,20,0,0,7); ctx.fill();
  if(B.phase==="msg"&&B.mi!==B._shownMi){ B._shownMi=B.mi; B.anim={kind:classify(B.msgs[B.mi]),t:0}; sfxFor(B.anim.kind); if(B.anim.kind==="super") FX.shake=9; }
  if(B.phase!=="msg") B.anim=null; var k=B.anim?B.anim.kind:"none", t=B.anim?B.anim.t:0; if(B.anim) B.anim.t++;
  var eShake=0,pShake=0,eOff=0,pOff=0,eAlpha=1,pAlpha=1,eScale=1,eDrop=0,flashE=0,flashP=0;
  if(k==="patk"){ pOff=Math.sin(Math.min(1,t/8)*Math.PI)*24; if(t>4)eShake=(t%2?3:-3); if(t<10)flashE=(1-t/10)*0.5; }
  else if(k==="eatk"){ eOff=-Math.sin(Math.min(1,t/8)*Math.PI)*24; if(t>4)pShake=(t%2?3:-3); if(t<10)flashP=(1-t/10)*0.5; }
  else if(k==="super"){ flashE=Math.max(0,(1-t/16))*0.75; eShake=(t%2?4:-4); }
  else if(k==="efaint"){ eAlpha=Math.max(0,1-t/24); eDrop=t*1.3; }
  else if(k==="pfaint"){ pAlpha=Math.max(0,1-t/24); }
  else if(k==="caught"){ eScale=Math.max(0.08,1-t/20); eAlpha=Math.max(0,1-t/26); }
  B.introT=(B.introT||0)+1; var ex=W*0.72, ey=H*0.33, mx=W*0.26, my=H*0.58;
  ctx.globalAlpha=eAlpha; drawCreature(ex+eShake+eOff, ey+eDrop, 80*eScale, wild.sp, false); ctx.globalAlpha=1;
  if(flashE>0){ ctx.fillStyle="rgba(255,255,255,"+flashE+")"; ctx.beginPath(); ctx.arc(ex,ey,42,0,7); ctx.fill(); }
  ctx.globalAlpha=pAlpha; drawCreature(mx+pShake+pOff, my, 98, me.sp, true); ctx.globalAlpha=1;
  if(flashP>0){ ctx.fillStyle="rgba(255,255,255,"+flashP+")"; ctx.beginPath(); ctx.arc(mx,my,50,0,7); ctx.fill(); }
  if(k==="throw"||k==="broke"){ var tp=Math.min(1,t/14); drawOrb(mx+(ex-mx)*tp, my-140*Math.sin(tp*Math.PI), 0); }
  else if(k==="caught"){ drawOrb(ex, ey+eDrop, Math.sin(t*0.5)*0.35*Math.max(0,1-t/22)); if(t>16){ sparkles(ex,ey,t); for(var cf=0;cf<12;cf++){ ctx.fillStyle=["#ff5252","#ffd740","#69f0ae","#40c4ff","#e040fb"][cf%5]; rr((cf*41+(t*3))%W,((t-16)*5+cf*13)%H,4,6); } } }
  if(k==="level"||k==="evolve"||k==="evolveStart") sparkles(mx,my,t);
  hpPanel(14,14,wild); hpPanel(W-166,H*0.40,me,true);
  if(B.trainer){ var rem=B.enemyTeam.length-B.enemyIdx; ctx.fillStyle="#e53935"; for(var d=0;d<B.enemyTeam.length;d++){ ctx.globalAlpha=d<rem?1:0.3; ctx.beginPath(); ctx.arc(24+d*14,66,5,0,7); ctx.fill(); } ctx.globalAlpha=1; }
  var py=H-104; ctx.fillStyle="rgba(16,18,40,.96)"; rr(6,py,W-12,98); ctx.strokeStyle="#ffcc33"; ctx.lineWidth=3; ctx.strokeRect(7.5,py+1.5,W-15,95);
  if(B.phase==="msg"){ btxt(B.msgs[B.mi]||"",22,py+42,"#fff",17); btxt("Z / A to continue",W-24,py+82,"#ffcc33",12,"right"); }
  else if(B.phase==="menu"){ var opts=["Fight","Bag","Team","Run"]; for(var i=0;i<4;i++){ var ox=(i%2===0)?52:W*0.55, oy=py+36+Math.floor(i/2)*34, sd=(B.sel===i); if(sd) btxt(">",ox-22,oy,"#ffcc33",18); btxt(opts[i],ox,oy,sd?"#ffcc33":"#fff",19); } btxt("Orbs "+G.orbs+"   Coins "+G.coins,W-24,py+16,"#cfe0ff",12,"right"); }
  else if(B.phase==="fight"){ var mv=me.moves; for(var j=0;j<mv.length;j++){ var mo=MOVES[mv[j]], oy=py+30+j*24, sd=(B.sel===j); if(sd) btxt(">",24,oy,"#ffcc33",16); btxt(mo.name,44,oy,sd?"#ffcc33":"#fff",16); btxt(mo.type+"   PWR "+mo.power,W*0.55,oy,"#9fb0e0",13); } btxt("X / B to go back",W-24,py+88,"#ffcc33",11,"right"); }
  else if(B.phase==="team"){ for(var s=0;s<G.party.length;s++){ var pm=G.party[s], oy=py+22+s*13, sd=(B.sel===s), col=pm.hp<=0?"#e57373":(sd?"#ffcc33":"#fff"); if(sd) btxt(">",24,oy,"#ffcc33",12); btxt(dname(pm)+"  L"+pm.level+"   "+Math.max(0,pm.hp)+"/"+pm.maxhp,44,oy,col,12); } if(!B.forced) btxt("X / B to go back",W-24,py+92,"#ffcc33",11,"right"); }
  else if(B.phase==="bag"){ var bag=[["orb","Buddy Orb",G.orbs],["potion","Potion",G.items.potion],["superpotion","Super Potion",G.items.superpotion]]; for(var bg=0;bg<bag.length;bg++){ var oy=py+30+bg*22, sd=(B.sel===bg); if(sd) btxt(">",24,oy,"#ffcc33",15); btxt(bag[bg][1]+"   x"+bag[bg][2],44,oy,sd?"#ffcc33":"#fff",15); } btxt("X / B to go back",W-24,py+90,"#ffcc33",11,"right"); }
  if(B.introT<16){ var ip=B.introT/16, bh=H/6; ctx.fillStyle="#12142a"; for(var bi=0;bi<6;bi++){ if(bi%2===0) rr(W*ip,bi*bh,W,bh+1); else rr(0,bi*bh,W*(1-ip),bh+1); } }
  ctx.restore();
}

/* ===== Title & boot ===== */
var titleEl=document.getElementById("title"), titleMenu=document.getElementById("titleMenu");
function setTitleSel(i){ G.titleSel=i; var b=titleMenu.querySelectorAll(".btn"); for(var k=0;k<b.length;k++) b[k].classList.toggle("sel",k===i); }
function titleInput(k){ if(k==="up"||k==="down"){ setTitleSel(1-G.titleSel); sfx("select"); } else if(k==="action"){ sfx("select"); if(G.titleSel===0) newGame(); else continueGame(); } }
function enterWorld(){ titleEl.classList.remove("on"); G.mode="world"; }
function resetNpcs(){ for(var mid in MAPS) MAPS[mid].npcs.forEach(function(n){ n.defeated=false; n.taken=false; n.gone=false; }); }
function newGame(){ resetNpcs(); G.mapId="town"; G.party=[]; G.box=[]; G.caught={}; G.seen={}; G.orbs=8; G.coins=60; G.items={potion:2,superpotion:0,revive:0,rareCandy:0,panacea:0}; G.keyItems={}; G.badges={}; G.flags={gotStarter:false,visited:{town:true}}; G.steps=0; G.settings={sound:true,run:false}; soundOn=true;
  var p=G.player; p.tx=18; p.ty=10; p.fromX=18; p.fromY=10; p.dir="down"; p.moving=false; p.prog=0; p.name="JJ"; p.color="#2196f3";
  G.follow={tx:18,ty:10,fromX:18,fromY:10};
  rollWeather(G.mapId); enterWorld(); var nm=askName("JJ"); G.player.name=nm;
  openChoice(["Blue hero","Red hero","Green hero","Purple hero"], function(i){ if(i<0) i=0; G.player.color=HERO_COLORS[i][1];
    openDialog("", ["Welcome to Jayhaven, "+nm+"!","Prof. Cedar is right nearby.","Press Z / A to talk to him and pick your first Buddy!"], null); }); }
function continueGame(){ if(hasSave()&&loadGame()){ rollWeather(G.mapId); enterWorld(); toast("Welcome back, "+G.player.name+"!"); } else toast("No saved adventure found."); }

setTitleSel(0);
titleMenu.querySelectorAll(".btn").forEach(function(b){ b.addEventListener("click", function(){ initAudio(); if(b.getAttribute("data-a")==="new") newGame(); else continueGame(); }); });
bindTouch(); resize();
function loop(){ TICK++; if(FX.fade>0) FX.fade=Math.max(0,FX.fade-0.06); if(FX.shake>0) FX.shake=Math.max(0,FX.shake-0.9); if(SAVEFLASH>0) SAVEFLASH--; updateParts(); if(G.mode==="world") updateWorld(); if(G.mode==="battle") renderBattle(); else if(G.mode==="dex") renderDex(); else if(G.mode==="quests") renderQuests(); else if(G.mode==="achievements") renderAchievements(); else if(G.mode==="title") renderTitle(); else renderWorld(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

/* ===== PWA: register service worker for offline install ===== */
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
