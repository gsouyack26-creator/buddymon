<style>

  #stage{ position:relative; }

    flex-direction:column; text-align:center; }

    text-shadow:3px 3px 0 #11132a, 0 0 22px rgba(255,204,51,.5); }
  #title h2{ font-size:20px; color:#cfe0ff; margin-top:2px; letter-spacing:6px; }
  #title p{ margin-top:24px; color:#9fb0e0; font-size:13px; padding:0 20px; }
  .menu{ margin-top:26px; display:flex; flex-direction:column; gap:12px; }
  .btn{ background:var(--panel); border:2px solid #3a4270; color:var(--ink); font-size:18px;
    padding:12px 34px; border-radius:10px; cursor:pointer; min-width:240px; transition:.12s; }
  .btn:hover,.btn.sel{ background:var(--accent); color:#1a1c2e; border-color:var(--accent);
    transform:translateY(-1px); }
  #dialog{ position:absolute; left:12px; right:12px; bottom:12px; min-height:96px;
    background:rgba(16,18,40,.96); border:3px solid var(--accent); border-radius:12px;
    padding:16px 20px; font-size:19px; line-height:1.4; display:none; }
  #dialog.on{ display:block; }
  #dialog .who{ color:var(--accent); font-weight:bold; font-size:14px; letter-spacing:1px; }
  #dialog .more{ position:absolute; right:16px; bottom:10px; color:var(--accent);
    animation:bob .8s infinite; font-size:16px; }
  @keyframes bob{ 50%{ transform:translateY(4px); } }
  #choice{ position:absolute; right:16px; bottom:120px; background:rgba(16,18,40,.98);
    border:3px solid var(--accent); border-radius:12px; padding:8px; display:none; min-width:150px; max-width:80%; }
  #choice.on{ display:block; }
  #choice .opt{ padding:8px 14px; border-radius:8px; font-size:17px; }
  #choice .opt.sel{ background:var(--accent); color:#1a1c2e; }
  #toast{ position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:rgba(16,18,40,.95); border:2px solid var(--grn); color:#dfffe0;
    padding:8px 16px; border-radius:20px; font-size:14px; opacity:0; transition:.3s; }

  #touch{ position:absolute; inset:0; display:none; }

  .pad{ position:absolute; }
  .pk{ position:absolute; background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.35);

/* ===== Sound (WebAudio beeps) ===== */
var AC=null, soundOn=true;
function initAudio(){ if(AC) return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
function beep(freq, dur, type, vol){
  if(!AC||!soundOn) return;
  try{ var o=AC.createOscillator(), g=AC.createGain();
    o.type=type||"square"; o.frequency.value=freq;
    g.gain.value=vol||0.06; o.connect(g); g.connect(AC.destination);
    var t=AC.currentTime; o.start(t); g.gain.setValueAtTime(g.gain.value,t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur); o.stop(t+dur);
  }catch(e){}
}
function sfx(kind){
  if(kind==="select") beep(660,0.06,"square",0.05);
  else if(kind==="hit") beep(180,0.12,"sawtooth",0.07);
  else if(kind==="super"){ beep(320,0.09,"square",0.07); setTimeout(function(){beep(480,0.12,"square",0.07);},70); }
  else if(kind==="faint") beep(140,0.35,"triangle",0.07);
  else if(kind==="catch"){ beep(520,0.08); setTimeout(function(){beep(700,0.12);},110); }
  else if(kind==="win"){ beep(523,0.1); setTimeout(function(){beep(659,0.1);},100); setTimeout(function(){beep(784,0.18);},200); }
  else if(kind==="level"){ beep(700,0.08); setTimeout(function(){beep(900,0.12);},80); }
  else if(kind==="evolve"){ beep(400,0.1); setTimeout(function(){beep(600,0.1);},120); setTimeout(function(){beep(900,0.2);},260); }
  else if(kind==="warp") beep(300,0.14,"sine",0.06);
}

function curMap(){ return MAPS[G.mapId]; }
function tileAt(x,y){ var g=curMap().grid; if(y<0||y>=g.length) return "T"; var row=g[y]; if(x<0||x>=row.length) return "T"; return row.charAt(x); }
function mapW(){ return curMap().grid[0].length; }
function mapH(){ return curMap().grid.length; }
var SOLID={ "T":1,"~":1,"o":1,"H":1,"R":1,"F":1,"L":1,"S":1 };
function npcActive(n){ if(n.gone) return false;
  if(n.role==="gate") return !G.badges[n.badge];
  if(n.rival) return !n.defeated;
  if(n.role==="item") return !n.taken;
  return true; }
function npcAt(x,y){ var a=curMap().npcs; for(var i=0;i<a.length;i++){ var n=a[i]; if(n.tx===x&&n.ty===y&&npcActive(n)) return n; } return null; }
function solid(x,y){ if(SOLID[tileAt(x,y)]===1) return true; return !!npcAt(x,y); }
function isTallGrass(x,y){ return tileAt(x,y)===","; }
function warpAt(x,y){ return curMap().warps[x+","+y]||null; }

/* ===== World render ===== */
var camPx=0,camPy=0;
function renderWorld(){
  var m=curMap(), p=G.player, MWp=mapW()*TS, MHp=mapH()*TS;
  var rx=p.fromX+(p.tx-p.fromX)*p.prog, ry=p.fromY+(p.ty-p.fromY)*p.prog;
  camPx=Math.max(0,Math.min(rx*TS+TS/2-W/2, Math.max(0,MWp-W)));
  camPy=Math.max(0,Math.min(ry*TS+TS/2-H/2, Math.max(0,MHp-H)));
  ctx.fillStyle=m.theme==="cave"?"#1c1830":m.theme==="gym"?"#8a6b3a":"#5aa84b"; rr(0,0,W,H);
  var c0=Math.floor(camPx/TS), r0=Math.floor(camPy/TS);
  for(var ty=r0; ty<=r0+VR; ty++) for(var tx=c0; tx<=c0+VC; tx++){ drawTile(tileAt(tx,ty), tx*TS-camPx, ty*TS-camPy, m.theme); }
  for(var i=0;i<m.npcs.length;i++){ var n=m.npcs[i]; if(!npcActive(n)) continue;
    if(n.tx>=c0-1&&n.tx<=c0+VC+1&&n.ty>=r0-1&&n.ty<=r0+VR+1) drawHuman(n.tx*TS-camPx,n.ty*TS-camPy,n.dir,n.body,n.hair,0); }
  var frame=p.moving?(Math.floor(p.prog*4)%2):0;
  drawHuman(rx*TS-camPx, ry*TS-camPy, p.dir, p.color, "#5d4037", frame);
  ctx.fillStyle="rgba(16,18,40,.72)"; rr(6,6,196,26);
  ctx.fillStyle="#ffcc33"; ctx.font="13px Trebuchet MS"; ctx.textBaseline="middle"; ctx.textAlign="left";
  ctx.fillText(m.name, 14, 20);
  ctx.fillStyle="#cfe0ff"; ctx.textAlign="right"; ctx.fillText("Team "+G.party.length+"/6   Orbs "+G.orbs, 196, 20); ctx.textAlign="left";
}

/* ===== Movement, warps, encounters ===== */
function updateWorld(){ var p=G.player;
  if(!p.moving){ var d=held.up?"up":held.down?"down":held.left?"left":held.right?"right":null; if(d) stepMove(d); }
  else { p.prog+=p.speed; if(p.prog>=1){ p.prog=0; p.moving=false; onStep(); } }
}
function delta(d){ return d==="up"?[0,-1]:d==="down"?[0,1]:d==="left"?[-1,0]:[1,0]; }
function stepMove(d){ var p=G.player; p.dir=d; var dd=delta(d), nx=p.tx+dd[0], ny=p.ty+dd[1];
  if(solid(nx,ny)) return; p.fromX=p.tx; p.fromY=p.ty; p.tx=nx; p.ty=ny; p.moving=true; p.prog=0; }
function doWarp(w){ sfx("warp"); G.mapId=w.map; var p=G.player; p.tx=w.x; p.ty=w.y; p.fromX=w.x; p.fromY=w.y; p.moving=false; p.prog=0; toast("Entering "+MAPS[w.map].name); saveGame(true); }
function onStep(){ G.steps++;
  var w=warpAt(G.player.tx,G.player.ty); if(w){ doWarp(w); return; }
  var wc=curMap().wild;
  if(wc && isTallGrass(G.player.tx,G.player.ty) && G.party.length>0 && firstAble()>=0 && Math.random()<0.16) return wildEncounter(wc);
  if(G.steps%24===0) saveGame(true);
}
function pickWild(pool){ var id=pool[Math.floor(Math.random()*pool.length)];
  if(SPECIES[id].rare && Math.random()<0.55) id=pool[Math.floor(Math.random()*pool.length)];
  return id; }
function wildEncounter(wc){ var id=pickWild(wc.pool), lvl=wc.min+Math.floor(Math.random()*(wc.max-wc.min+1));
  G.seen[id]=true; startBattle(makeMon(id,lvl), true); }

/* ===== Interaction ===== */
function interact(){ var p=G.player, dd=delta(p.dir), fx=p.tx+dd[0], fy=p.ty+dd[1];
  var n=npcAt(fx,fy);
  if(n) return talkNPC(n);
  var s=SIGNS[G.mapId+","+fx+","+fy]; if(s) return openDialog("", s, null);
}
function talkNPC(n){
  if(n.role==="prof"){ if(!G.flags.gotStarter) return starterFlow(n); return openDialog(n.name,"Take good care of your Buddies, JJ. Adventure awaits!",null); }
  if(n.role==="heal") return openDialog(n.name,"Let me tend to your team...",function(){ healParty(); sfx("catch"); toast("Your team is fully healed!"); });
  if(n.role==="talk") return openDialog(n.name, n.lines||["Hello, JJ!"], null);
  if(n.role==="gate") return openDialog(n.name, n.locked, null);
  if(n.role==="item"){ return openDialog(n.name, n.lines, function(){ if(n.item==="orbs"){ G.orbs+=n.amt; } n.taken=true; sfx("catch"); saveGame(true); }); }
  if(n.role==="trainer"){ if(n.defeated) return openDialog(n.name, (n.win&&n.win[n.win.length-1])?[n.win[n.win.length-1]]:["Good luck out there!"], null);
    return openDialog(n.name, n.pre||["Let us battle!"], function(){ startTrainer(n); }); }
}
function healParty(){ for(var i=0;i<G.party.length;i++) G.party[i].hp=G.party[i].maxhp; saveGame(true); }

/* ===== Input router ===== */
function input(k){
  if(G.mode==="title") return titleInput(k);
  if(G.mode==="dialog") return dialogInput(k);
  if(G.mode==="choice") return choiceInput(k);
  if(G.mode==="dex") return dexInput(k);
  if(G.mode==="battle") return battleInput(k);
  if(k==="action") interact(); else if(k==="back") openTeamMenu();
}
var KEYMAP={ ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",
  w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right",
  z:"action",Z:"action"," ":"action",Enter:"action",x:"back",X:"back",Escape:"back",Backspace:"back" };
window.addEventListener("keydown", function(e){ var m=KEYMAP[e.key]; if(!m) return; e.preventDefault(); initAudio();
  if(m==="up"||m==="down"||m==="left"||m==="right"){ if(G.mode==="world"){ held[m]=true; } else input(m); } else input(m); });
window.addEventListener("keyup", function(e){ var m=KEYMAP[e.key]; if(m&&held.hasOwnProperty(m)) held[m]=false; });
function bindTouch(){
  document.querySelectorAll("[data-d]").forEach(function(el){ var d=el.getAttribute("data-d");
    el.addEventListener("touchstart", function(ev){ ev.preventDefault(); initAudio(); if(G.mode==="world") held[d]=true; else input(d); }, {passive:false});
    el.addEventListener("touchend", function(ev){ ev.preventDefault(); held[d]=false; }, {passive:false}); });
  document.querySelectorAll("[data-k]").forEach(function(el){ var k=el.getAttribute("data-k")==="a"?"action":"back";
    el.addEventListener("touchstart", function(ev){ ev.preventDefault(); initAudio(); input(k); }, {passive:false}); });
}

/* ===== Buddies, leveling, evolution ===== */
function makeMon(id,level){ var sp=SPECIES[id], b=sp.base, maxhp=b.hp+level*3+6;
  return { id:id, sp:sp, name:sp.name, nick:null, level:level, maxhp:maxhp, hp:maxhp, atk:b.atk+level, def:b.def+level, spd:b.spd+level, xp:0, moves:sp.moves.slice() }; }
function dname(m){ return m.nick||m.name; }
function xpToNext(l){ return 14+l*10; }
function gainXp(mon, amt, msgs){ mon.xp+=amt; msgs.push(dname(mon)+" gained "+amt+" XP.");
  while(mon.xp>=xpToNext(mon.level)){ mon.xp-=xpToNext(mon.level); mon.level++; mon.maxhp+=3; mon.hp+=3; mon.atk++; mon.def++; mon.spd++; msgs.push(dname(mon)+" grew to level "+mon.level+"!"); } }
function evolveCheck(mon, msgs){ var e=mon.sp.evo; if(!e||mon.level<e.lvl) return false;
  var ratio=mon.hp/mon.maxhp, ns=SPECIES[e.to], b=ns.base, oldName=dname(mon);
  mon.id=e.to; mon.sp=ns; if(!mon.nick) mon.name=ns.name; mon.maxhp=b.hp+mon.level*3+6; mon.hp=Math.max(1,Math.round(mon.maxhp*ratio));
  mon.atk=b.atk+mon.level; mon.def=b.def+mon.level; mon.spd=b.spd+mon.level; mon.moves=ns.moves.slice();
  G.seen[e.to]=true; G.caught[e.to]=true; msgs.push(oldName+" is evolving..."); msgs.push(oldName+" evolved into "+ns.name+"!"); return true; }
function addBuddy(m){ if(G.party.length<6){ G.party.push(m); return "team"; } G.box.push(m); return "box"; }
function firstAble(){ for(var i=0;i<G.party.length;i++) if(G.party[i].hp>0) return i; return -1; }

function openChoice(opts, onPick){ G.choicePrev=G.mode; G.choice={opts:opts,sel:0,onPick:onPick}; G.mode="choice"; choiceEl.classList.add("on"); drawChoice(); }

  if(k==="up"){ c.sel=(c.sel-1+c.opts.length)%c.opts.length; sfx("select"); drawChoice(); }

/* ===== Save / load ===== */
var SAVE_KEY="bmon_save_v2";
function serMon(m){ return {id:m.id,nick:m.nick,level:m.level,hp:m.hp,maxhp:m.maxhp,atk:m.atk,def:m.def,spd:m.spd,xp:m.xp}; }
function deMon(o){ var m=makeMon(o.id,o.level); m.nick=o.nick||null; m.hp=o.hp; m.maxhp=o.maxhp; m.atk=o.atk; m.def=o.def; m.spd=o.spd; m.xp=o.xp; if(!m.nick) m.name=SPECIES[o.id].name; return m; }
function serNpcs(){ var out={}; for(var mid in MAPS){ MAPS[mid].npcs.forEach(function(n){ if(n.defeated||n.taken||n.gone) out[mid+"|"+n.name]={defeated:!!n.defeated,taken:!!n.taken,gone:!!n.gone}; }); } return out; }
function applyNpcs(states){ if(!states) return; for(var mid in MAPS){ MAPS[mid].npcs.forEach(function(n){ var s=states[mid+"|"+n.name]; if(s){ n.defeated=s.defeated; n.taken=s.taken; n.gone=s.gone; } }); } }
function saveGame(silent){ try{ var d={ mapId:G.mapId,
    player:{tx:G.player.tx,ty:G.player.ty,dir:G.player.dir,name:G.player.name,color:G.player.color},
    party:G.party.map(serMon), box:G.box.map(serMon), caught:G.caught, seen:G.seen, orbs:G.orbs, badges:G.badges, flags:G.flags, steps:G.steps, npcs:serNpcs() };
  localStorage.setItem(SAVE_KEY, JSON.stringify(d)); if(!silent) toast("Game saved!"); }catch(e){ if(!silent) toast("Save failed."); } }
function hasSave(){ return !!localStorage.getItem(SAVE_KEY); }
function loadGame(){ try{ var d=JSON.parse(localStorage.getItem(SAVE_KEY)); if(!d) return false;
  G.mapId=d.mapId||"town"; G.player.tx=d.player.tx; G.player.ty=d.player.ty; G.player.dir=d.player.dir||"down";
  G.player.name=d.player.name||"JJ"; G.player.color=d.player.color||"#2196f3"; G.player.moving=false; G.player.prog=0; G.player.fromX=G.player.tx; G.player.fromY=G.player.ty;
  G.party=(d.party||[]).map(deMon); G.box=(d.box||[]).map(deMon); G.caught=d.caught||{}; G.seen=d.seen||{}; G.orbs=(d.orbs!=null)?d.orbs:8; G.badges=d.badges||{}; G.flags=d.flags||{gotStarter:false}; G.steps=d.steps||0; applyNpcs(d.npcs); return true; }catch(e){ return false; } }

/* ===== Battle engine ===== */
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function eMoveOf(m){ return MOVES[m.moves[Math.floor(Math.random()*m.moves.length)]]; }
function hit(a,d,mv){ var mult=typeMult(mv.type,d.sp.type), stab=(mv.type===a.sp.type)?1.5:1;
  var dmg=Math.floor((a.atk*mv.power/(d.def+18))*mult*stab*(0.85+Math.random()*0.15))+1; d.hp=Math.max(0,d.hp-dmg); return {dmg:dmg,mult:mult}; }
function addEff(msgs,r){ if(r.mult>1) msgs.push("It is super effective!"); else if(r.mult>0&&r.mult<1) msgs.push("It is not very effective..."); else if(r.mult===0) msgs.push("It had no effect..."); }
function queueMsgs(arr,after){ var B=G.battle; B.msgs=arr; B.mi=0; B._shownMi=-1; B.phase="msg"; B.after=after; }
function startBattle(wild,isWild){ var idx=firstAble(); if(idx<0) return;
  G.battle={ wild:wild,isWild:isWild,trainer:null,me:idx,phase:"msg",sel:0,forced:false,msgs:[],mi:0,after:null,anim:null,_shownMi:-1 }; G.mode="battle";
  queueMsgs(["A wild "+wild.name+" (L"+wild.level+") appeared!"], function(){ G.battle.phase="menu"; G.battle.sel=0; }); }
function startTrainer(npc){ var idx=firstAble(); if(idx<0){ toast("Your team cannot battle!"); return; }
  var team=npc.team.map(function(t){ return makeMon(t[0],t[1]); });
  G.battle={ trainer:npc,isWild:false,enemyTeam:team,enemyIdx:0,wild:team[0],me:idx,phase:"msg",sel:0,forced:false,msgs:[],mi:0,after:null,anim:null,_shownMi:-1 }; G.mode="battle";
  queueMsgs([npc.name+" wants to battle!","Go, "+dname(G.party[idx])+"!"], function(){ G.battle.phase="menu"; G.battle.sel=0; }); }
function afterTurn(){ var B=G.battle, me=G.party[B.me];
  if(B.wild.hp<=0){ var msgs=[]; gainXp(me, B.wild.level*6+10, msgs); evolveCheck(me, msgs);
    if(B.trainer){ B.enemyIdx++;
      if(B.enemyIdx<B.enemyTeam.length){ B.wild=B.enemyTeam[B.enemyIdx]; msgs.push(B.trainer.name+" sent out "+B.wild.name+"!"); queueMsgs(msgs, function(){ B.phase="menu"; B.sel=0; }); }
      else { var npc=B.trainer; msgs.push("You defeated "+npc.name+"!"); queueMsgs(msgs, function(){ npc.defeated=true; if(npc.badge) G.badges[npc.badge]=true; if(npc.reward) G.orbs+=npc.reward; endBattle(); sfx("win"); var extra=[]; if(npc.badge) extra.push("You earned the "+cap(npc.badge)+" Badge!"); openDialog(npc.name, (npc.win||["Well fought!"]).concat(extra), function(){ saveGame(true); }); }); } }
    else { queueMsgs(msgs, function(){ sfx("win"); endBattle(); }); } }
  else if(me.hp<=0){ faintSeq(); }
  else { B.phase="menu"; B.sel=0; } }
function faintSeq(){ var B=G.battle, alive=firstAble();
  if(alive>=0){ queueMsgs(["Choose your next Buddy!"], function(){ B.forced=true; B.phase="team"; B.sel=alive; }); }
  else { queueMsgs(["Every Buddy fainted!"], function(){ endBattle(); whiteout(); }); } }
function resolveTurn(pMove){ var B=G.battle, me=G.party[B.me], wild=B.wild, eMove=eMoveOf(wild), msgs=[];
  var order=(me.spd>=wild.spd)?["p","e"]:["e","p"];
  for(var i=0;i<2;i++){ if(order[i]==="p"&&me.hp>0&&wild.hp>0){ var r=hit(me,wild,pMove); msgs.push(dname(me)+" used "+pMove.name+"!"); addEff(msgs,r); if(wild.hp<=0) msgs.push((B.trainer?"":"Wild ")+wild.name+" fainted!"); }
    else if(order[i]==="e"&&wild.hp>0&&me.hp>0){ var r2=hit(wild,me,eMove); msgs.push((B.trainer?"":"Wild ")+wild.name+" used "+eMove.name+"!"); addEff(msgs,r2); if(me.hp<=0) msgs.push(dname(me)+" fainted!"); } }
  queueMsgs(msgs, afterTurn); }
function doSwitch(i,vol){ var B=G.battle; B.me=i; B.forced=false; var msgs=[dname(G.party[i])+", go!"];
  if(vol&&B.wild.hp>0){ var e=eMoveOf(B.wild), r=hit(B.wild,G.party[i],e); msgs.push((B.trainer?"":"Wild ")+B.wild.name+" used "+e.name+"!"); addEff(msgs,r); if(G.party[i].hp<=0) msgs.push(dname(G.party[i])+" fainted!"); }
  queueMsgs(msgs, function(){ if(G.party[B.me].hp<=0) faintSeq(); else { B.phase="menu"; B.sel=0; } }); }
function throwOrb(){ var B=G.battle;
  if(B.trainer){ queueMsgs(["You cannot catch another trainer Buddy!"], function(){ B.phase="menu"; B.sel=0; }); return; }
  var wild=B.wild, sp=wild.sp; G.orbs--;
  var chance=Math.max(0.05,Math.min(0.92, 0.15+(1-wild.hp/wild.maxhp)*0.55+(sp.catchRate/500)));
  if(Math.random()<chance){ var mon=makeMon(wild.id,wild.level); mon.hp=Math.max(1,wild.hp); G.caught[wild.id]=true; G.seen[wild.id]=true;
    var m=["You threw a Buddy Orb...","Gotcha! "+wild.name+" was caught!"];
    queueMsgs(m, function(){ sfx("catch"); endBattle(); offerNickname(mon, function(){ var where=addBuddy(mon); if(where==="box") toast(mon.name+" was sent to your Box."); saveGame(true); }); }); }
  else { var msgs=["You threw a Buddy Orb...", wild.name+" broke free!"];
    if(wild.hp>0){ var e=eMoveOf(wild), me=G.party[B.me], r=hit(wild,me,e); msgs.push("Wild "+wild.name+" used "+e.name+"!"); addEff(msgs,r); if(me.hp<=0) msgs.push(dname(me)+" fainted!"); }
    queueMsgs(msgs, function(){ if(G.party[B.me].hp<=0) faintSeq(); else { B.phase="menu"; B.sel=0; } }); } }
function attemptRun(){ var B=G.battle;
  if(B.trainer){ queueMsgs(["No running from a trainer battle!"], function(){ B.phase="menu"; B.sel=0; }); return; }
  var me=G.party[B.me], chance=Math.max(0.25,Math.min(0.95, 0.5+(me.spd-B.wild.spd)*0.05));
  if(Math.random()<chance){ queueMsgs(["You got away safely!"], endBattle); }
  else { var msgs=["You could not get away!"]; var e=eMoveOf(B.wild), r=hit(B.wild,me,e); msgs.push("Wild "+B.wild.name+" used "+e.name+"!"); addEff(msgs,r); if(me.hp<=0) msgs.push(dname(me)+" fainted!");
    queueMsgs(msgs, function(){ if(G.party[B.me].hp<=0) faintSeq(); else { B.phase="menu"; B.sel=0; } }); } }
function endBattle(){ G.battle=null; G.mode="world"; saveGame(true); }
function whiteout(){ healParty(); G.mapId="town"; var p=G.player; p.tx=18; p.ty=10; p.fromX=18; p.fromY=10; p.moving=false; p.prog=0; toast("Your team was healed at home."); saveGame(true); }
function battleInput(k){ var B=G.battle; if(!B) return;
  if(B.phase==="msg"){ if(k==="action"||k==="back"){ B.mi++; if(B.mi>=B.msgs.length){ var a=B.after; B.after=null; B.msgs=[]; B.mi=0; if(a) a(); } } return; }
  sfx("select");
  if(B.phase==="menu"){ if(k==="up"&&B.sel>=2) B.sel-=2; else if(k==="down"&&B.sel<2) B.sel+=2; else if(k==="left"&&B.sel%2===1) B.sel--; else if(k==="right"&&B.sel%2===0) B.sel++;
    else if(k==="action"){ if(B.sel===0){ B.phase="fight"; B.sel=0; } else if(B.sel===1){ if(G.orbs<=0&&!B.trainer) queueMsgs(["You have no Buddy Orbs!"],function(){B.phase="menu";B.sel=0;}); else throwOrb(); } else if(B.sel===2){ B.phase="team"; B.sel=(firstAble()>=0?firstAble():0); } else attemptRun(); } return; }
  if(B.phase==="fight"){ var mv=G.party[B.me].moves; if(k==="up") B.sel=(B.sel-1+mv.length)%mv.length; else if(k==="down") B.sel=(B.sel+1)%mv.length; else if(k==="action") resolveTurn(MOVES[mv[B.sel]]); else if(k==="back"){ B.phase="menu"; B.sel=0; } return; }
  if(B.phase==="team"){ var n=G.party.length; if(k==="up") B.sel=(B.sel-1+n)%n; else if(k==="down") B.sel=(B.sel+1)%n; else if(k==="action"){ var t=G.party[B.sel]; if(t.hp>0&&B.sel!==B.me) doSwitch(B.sel,!B.forced); else if(t.hp<=0) toast("That Buddy has fainted!"); } else if(k==="back"&&!B.forced){ B.phase="menu"; B.sel=0; } return; } }

/* ===== Battle render ===== */
function btxt(s,x,y,c,sz,al){ ctx.fillStyle=c; ctx.font=(sz||14)+"px Trebuchet MS"; ctx.textAlign=al||"left"; ctx.textBaseline="middle"; ctx.fillText(s,x,y); ctx.textAlign="left"; }
function hpPanel(x,y,mon){ ctx.fillStyle="rgba(16,18,40,.9)"; rr(x,y,152,44); ctx.strokeStyle="#3a4270"; ctx.lineWidth=2; ctx.strokeRect(x+0.5,y+0.5,151,43);
  btxt(dname(mon)+"  L"+mon.level, x+8,y+13,"#fff",13); ctx.fillStyle="#222"; rr(x+8,y+24,136,8);
  var pct=Math.max(0,mon.hp/mon.maxhp), col=pct>0.5?"#4caf50":pct>0.2?"#ffb300":"#e53935"; ctx.fillStyle=col; rr(x+8,y+24,136*pct,8);
  btxt(Math.max(0,mon.hp)+"/"+mon.maxhp, x+8,y+38,"#cfe0ff",10); }
function classify(msg){ if(msg.indexOf("super effective")>=0) return "super"; if(msg.indexOf("evolved into")>=0) return "evolve"; if(msg.indexOf("evolving")>=0) return "evolveStart";
  if(msg.indexOf("grew to level")>=0) return "level"; if(msg.indexOf("Gotcha")>=0) return "caught"; if(msg.indexOf("broke free")>=0) return "broke";
  if(msg.indexOf(" used ")>=0){ return msg.indexOf("Wild ")===0||(G.battle.trainer&&msg.indexOf(dname(G.party[G.battle.me]))!==0)?"eatk":"patk"; }
  if(msg.indexOf("fainted")>=0){ return (msg.indexOf("Wild ")===0||(G.battle.trainer&&msg.indexOf(dname(G.party[G.battle.me]))!==0))?"efaint":"pfaint"; } return "none"; }
function sfxFor(k){ if(k==="patk"||k==="eatk") sfx("hit"); else if(k==="super") sfx("super"); else if(k==="efaint"||k==="pfaint") sfx("faint"); else if(k==="level") sfx("level"); else if(k==="evolve") sfx("evolve"); else if(k==="caught") sfx("catch"); }
function sparkles(cx,cy,t){ for(var i=0;i<7;i++){ var a=i*0.9+t*0.15, rad=20+((t*2+i*9)%40); var x=cx+Math.cos(a)*rad, y=cy+Math.sin(a)*rad*0.7; ctx.fillStyle="#ffe066"; ctx.save(); ctx.translate(x,y); ctx.rotate(a); rr(-2,-2,4,4); ctx.restore(); } }
function renderBattle(){ var B=G.battle; if(!B){ renderWorld(); return; } var me=G.party[B.me], wild=B.wild;
  var g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#8fd0ff"); g.addColorStop(1,"#cfeeff"); ctx.fillStyle=g; rr(0,0,W,H);
  ctx.fillStyle="#a6e07a"; rr(0,H*0.58,W,H*0.42);
  ctx.fillStyle="rgba(0,0,0,.10)"; ctx.beginPath(); ctx.ellipse(W*0.72,H*0.40,70,18,0,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(W*0.26,H*0.66,82,20,0,0,7); ctx.fill();
  if(B.phase==="msg"&&B.mi!==B._shownMi){ B._shownMi=B.mi; B.anim={kind:classify(B.msgs[B.mi]),t:0}; sfxFor(B.anim.kind); }
  if(B.phase!=="msg") B.anim=null; var k=B.anim?B.anim.kind:"none", t=B.anim?B.anim.t:0; if(B.anim) B.anim.t++;
  var eShake=0,pShake=0,eOff=0,pOff=0,eAlpha=1,pAlpha=1,eScale=1,eDrop=0,flashE=0,flashP=0;
  if(k==="patk"){ pOff=Math.sin(Math.min(1,t/8)*Math.PI)*24; if(t>4)eShake=(t%2?3:-3); if(t<10)flashE=(1-t/10)*0.5; }
  else if(k==="eatk"){ eOff=-Math.sin(Math.min(1,t/8)*Math.PI)*24; if(t>4)pShake=(t%2?3:-3); if(t<10)flashP=(1-t/10)*0.5; }
  else if(k==="super"){ flashE=Math.max(0,(1-t/16))*0.75; eShake=(t%2?4:-4); }
  else if(k==="efaint"){ eAlpha=Math.max(0,1-t/24); eDrop=t*1.3; }
  else if(k==="pfaint"){ pAlpha=Math.max(0,1-t/24); }
  else if(k==="caught"){ eScale=Math.max(0.08,1-t/20); eAlpha=Math.max(0,1-t/26); }
  var ex=W*0.72, ey=H*0.33, mx=W*0.26, my=H*0.58;
  ctx.globalAlpha=eAlpha; drawCreature(ex+eShake+eOff, ey+eDrop, 80*eScale, wild.sp, false); ctx.globalAlpha=1;
  if(flashE>0){ ctx.fillStyle="rgba(255,255,255,"+flashE+")"; ctx.beginPath(); ctx.arc(ex,ey,42,0,7); ctx.fill(); }
  ctx.globalAlpha=pAlpha; drawCreature(mx+pShake+pOff, my, 98, me.sp, true); ctx.globalAlpha=1;
  if(flashP>0){ ctx.fillStyle="rgba(255,255,255,"+flashP+")"; ctx.beginPath(); ctx.arc(mx,my,50,0,7); ctx.fill(); }
  if(k==="level"||k==="evolve"||k==="evolveStart") sparkles(mx,my,t);
  hpPanel(14,14,wild); hpPanel(W-166,H*0.44,me);
  if(B.trainer){ var rem=B.enemyTeam.length-B.enemyIdx; ctx.fillStyle="#e53935"; for(var d=0;d<B.enemyTeam.length;d++){ ctx.globalAlpha=d<rem?1:0.3; ctx.beginPath(); ctx.arc(24+d*14,66,5,0,7); ctx.fill(); } ctx.globalAlpha=1; }
  var py=H-104; ctx.fillStyle="rgba(16,18,40,.96)"; rr(6,py,W-12,98); ctx.strokeStyle="#ffcc33"; ctx.lineWidth=3; ctx.strokeRect(7.5,py+1.5,W-15,95);
  if(B.phase==="msg"){ btxt(B.msgs[B.mi]||"",22,py+42,"#fff",17); btxt("Z / A to continue",W-24,py+82,"#ffcc33",12,"right"); }
  else if(B.phase==="menu"){ var opts=["Fight",B.trainer?"Catch (no)":"Catch","Team","Run"]; for(var i=0;i<4;i++){ var ox=(i%2===0)?52:W*0.55, oy=py+36+Math.floor(i/2)*34, sd=(B.sel===i); if(sd) btxt(">",ox-22,oy,"#ffcc33",18); btxt(opts[i],ox,oy,sd?"#ffcc33":"#fff",19); } btxt("Orbs: "+G.orbs,W-24,py+16,"#cfe0ff",12,"right"); }
  else if(B.phase==="fight"){ var mv=me.moves; for(var j=0;j<mv.length;j++){ var mo=MOVES[mv[j]], oy=py+30+j*24, sd=(B.sel===j); if(sd) btxt(">",24,oy,"#ffcc33",16); btxt(mo.name,44,oy,sd?"#ffcc33":"#fff",16); btxt(mo.type+"   PWR "+mo.power,W*0.55,oy,"#9fb0e0",13); } btxt("X / B to go back",W-24,py+88,"#ffcc33",11,"right"); }
  else if(B.phase==="team"){ for(var s=0;s<G.party.length;s++){ var pm=G.party[s], oy=py+22+s*13, sd=(B.sel===s), col=pm.hp<=0?"#e57373":(sd?"#ffcc33":"#fff"); if(sd) btxt(">",24,oy,"#ffcc33",12); btxt(dname(pm)+"  L"+pm.level+"   "+Math.max(0,pm.hp)+"/"+pm.maxhp,44,oy,col,12); } if(!B.forced) btxt("X / B to go back",W-24,py+92,"#ffcc33",11,"right"); }
}

/* ===== Title & boot ===== */
var titleEl=document.getElementById("title"), titleMenu=document.getElementById("titleMenu");
function setTitleSel(i){ G.titleSel=i; var b=titleMenu.querySelectorAll(".btn"); for(var k=0;k<b.length;k++) b[k].classList.toggle("sel",k===i); }
function titleInput(k){ if(k==="up"||k==="down"){ setTitleSel(1-G.titleSel); sfx("select"); } else if(k==="action"){ sfx("select"); if(G.titleSel===0) newGame(); else continueGame(); } }
function enterWorld(){ titleEl.classList.remove("on"); G.mode="world"; }
function resetNpcs(){ for(var mid in MAPS) MAPS[mid].npcs.forEach(function(n){ n.defeated=false; n.taken=false; n.gone=false; }); }
function newGame(){ resetNpcs(); G.mapId="town"; G.party=[]; G.box=[]; G.caught={}; G.seen={}; G.orbs=8; G.badges={}; G.flags={gotStarter:false}; G.steps=0;
  var p=G.player; p.tx=18; p.ty=10; p.fromX=18; p.fromY=10; p.dir="down"; p.moving=false; p.prog=0; p.name="JJ"; p.color="#2196f3";
  enterWorld(); var nm=askName("JJ"); G.player.name=nm;
  openChoice(["Blue hero","Red hero","Green hero","Purple hero"], function(i){ if(i<0) i=0; G.player.color=HERO_COLORS[i][1];
    openDialog("", ["Welcome to Jayhaven, "+nm+"!","Prof. Cedar is right nearby.","Press Z / A to talk to him and pick your first Buddy!"], null); }); }
function continueGame(){ if(hasSave()&&loadGame()){ enterWorld(); toast("Welcome back, "+G.player.name+"!"); } else toast("No saved adventure found."); }

setTitleSel(0);
titleMenu.querySelectorAll(".btn").forEach(function(b){ b.addEventListener("click", function(){ initAudio(); if(b.getAttribute("data-a")==="new") newGame(); else continueGame(); }); });
bindTouch(); resize();
function loop(){ if(G.mode==="world") updateWorld(); if(G.mode==="battle") renderBattle(); else if(G.mode==="dex") renderDex(); else renderWorld(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

/* ===== PWA: register service worker for offline install ===== */
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
