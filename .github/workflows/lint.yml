name: Lint

on:
  push:
    paths:
      - "index.html"
      - "sw.js"
      - "scripts/**"
      - "package.json"
      - ".eslintrc.json"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "index.html"
      - "sw.js"
      - "scripts/**"
      - "package.json"
      - ".eslintrc.json"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint
